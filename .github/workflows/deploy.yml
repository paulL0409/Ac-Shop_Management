name: Deploy AC Shop

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build application
        run: mvn clean package -DskipTests

      - name: Prepare jar
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name "*.jar" | head -n 1)
          cp "$JAR_FILE" app.jar

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "app.jar"
          target: "/tmp"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            sudo mv /tmp/app.jar /opt/ac-shop/app.jar
            sudo chown ec2-user:ec2-user /opt/ac-shop/app.jar
            sudo systemctl restart ac-shop
            sudo systemctl status ac-shop --no-pager